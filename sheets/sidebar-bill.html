<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; font-size: 13px; margin: 0; padding: 0; }
    body { background: #fafafa; }

    .header { background: #2d2d2d; color: #fff; padding: 10px 12px; font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }

    .tabs { display: flex; border-bottom: 2px solid #e0e0e0; background: #fff; position: sticky; top: 38px; z-index: 9; }
    .tab { flex: 1; padding: 8px 0; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #4285f4; border-bottom-color: #4285f4; }

    .content { padding: 12px; padding-bottom: 16px; }
    .panel { display: none; }
    .panel.active { display: block; }

    label { display: block; margin: 7px 0 3px; font-weight: bold; color: #555; font-size: 11px; text-transform: uppercase; }
    input, select { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    input:focus, select:focus { border-color: #4285f4; outline: none; }
    .row2 { display: flex; gap: 6px; }
    .row2 > div { flex: 1; }

    .btn { display: inline-block; padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
    .btn-primary { background: #4285f4; color: white; }
    .btn-primary:hover { background: #3367d6; }
    .btn-red { background: #e53935; color: white; }
    .btn-red:hover { background: #c62828; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #ccc; }
    .btn-full { width: 100%; margin-top: 8px; }

    #status { padding: 8px 12px; font-size: 12px; min-height: 32px; }
    .ok  { color: #2e7d32; background: #e8f5e9; border-radius: 4px; }
    .err { color: #c62828; background: #ffebee; border-radius: 4px; }

    /* Bills list */
    .bills-list { margin-top: 8px; }
    .bill-row { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; margin: 5px 0; }
    .bill-row.paid { border-color: #a5d6a7; background: #f1f8e9; }
    .bill-row.void { opacity: 0.5; }
    .bill-top { display: flex; justify-content: space-between; align-items: center; }
    .bill-vendor { font-weight: bold; font-size: 13px; }
    .bill-amount { font-weight: bold; font-size: 13px; }
    .bill-meta { color: #888; font-size: 11px; margin-top: 2px; }
    .bill-status { display: inline-block; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; }
    .status-posted  { background: #e3f2fd; color: #1565c0; }
    .status-paid    { background: #e8f5e9; color: #2e7d32; }
    .status-partial { background: #fff3e0; color: #e65100; }
    .status-void    { background: #f5f5f5; color: #757575; }

    .filter-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .filter-row select { flex: 1; }
    .filter-row button { flex: 0 0 36px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }

    .loading { color: #888; font-style: italic; padding: 8px 0; }
  </style>
</head>
<body>

<div class="header">
  <span>🧾 Bills</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('new')">New Bill</div>
  <div class="tab" onclick="switchTab('list')">Open Bills</div>
</div>

<div id="status">&nbsp;</div>

<!-- NEW BILL PANEL -->
<div id="panel-new" class="content panel active">
  <label>Vendor *</label>
  <input type="text" id="vendor" placeholder="Acme Corp" autocomplete="off">

  <div class="row2">
    <div>
      <label>Invoice Date *</label>
      <input type="date" id="billDate">
    </div>
    <div>
      <label>Due Date *</label>
      <input type="date" id="dueDate">
    </div>
  </div>

  <div class="row2">
    <div>
      <label>Amount *</label>
      <input type="number" id="amount" step="0.01" placeholder="0.00">
    </div>
    <div>
      <label>Currency</label>
      <select id="currency">
        <option value="">Home currency</option>
        <option>SGD</option><option>USD</option><option>EUR</option>
        <option>GBP</option><option>SEK</option><option>JPY</option>
        <option>AUD</option><option>HKD</option><option>CNY</option>
      </select>
    </div>
  </div>

  <label>Vendor Reference (Invoice #)</label>
  <input type="text" id="vendorRef" placeholder="INV-2025-001">

  <label>Expense Account *</label>
  <select id="expenseAccount"><option value="">Loading…</option></select>

  <label>AP Account *</label>
  <select id="apAccount"><option value="">Loading…</option></select>

  <label>VAT Code</label>
  <select id="vatCode"><option value="">None</option></select>

  <label>Description</label>
  <input type="text" id="description" placeholder="Optional notes">

  <div class="row2" style="margin-top: 8px;">
    <button class="btn btn-secondary" style="flex:1" onclick="clearForm()">Clear</button>
    <button class="btn btn-primary" style="flex:2" onclick="submitBill()">Post Bill</button>
  </div>
</div>

<!-- OPEN BILLS PANEL -->
<div id="panel-list" class="content panel">
  <div class="filter-row">
    <select id="filterStatus" onchange="loadBills()">
      <option value="">All statuses</option>
      <option value="posted">Open (posted)</option>
      <option value="partial">Partial</option>
      <option value="paid">Paid</option>
      <option value="void">Void</option>
    </select>
    <button onclick="loadBills()">↻</button>
  </div>
  <div id="billsList"><div class="loading">Loading bills…</div></div>
</div>

<script>
var accounts = [], vatCodes = [];
var today = new Date().toISOString().substring(0, 10);
var due30 = new Date(Date.now() + 30*24*60*60*1000).toISOString().substring(0, 10);

document.getElementById('billDate').value = today;
document.getElementById('dueDate').value = due30;

// --- Tab switching ---
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (tab === 'new' && i === 0) || (tab === 'list' && i === 1));
  });
  document.getElementById('panel-new').classList.toggle('active', tab === 'new');
  document.getElementById('panel-list').classList.toggle('active', tab === 'list');
  if (tab === 'list') loadBills();
}

// --- Load accounts and VAT codes ---
google.script.run.withSuccessHandler(function(data) {
  accounts = data.accounts || [];
  vatCodes = data.vatCodes || [];

  // Expense accounts: all except Assets/Liabilities with code >= 3
  var expSel = document.getElementById('expenseAccount');
  var apSel = document.getElementById('apAccount');
  var vatSel = document.getElementById('vatCode');
  expSel.innerHTML = '<option value="">Select…</option>';
  apSel.innerHTML = '<option value="">Select…</option>';
  vatSel.innerHTML = '<option value="">None</option>';

  accounts.forEach(function(a) {
    var opt = '<option value="' + a.code + '">' + a.code + ' — ' + a.name + '</option>';
    if (a.type === 'Expense' || a.type === 'Revenue') expSel.innerHTML += opt;
    if (a.type === 'Liability') apSel.innerHTML += opt;
  });

  vatCodes.forEach(function(v) {
    vatSel.innerHTML += '<option value="' + v.code + '">' + v.code + ' (' + (v.rate*100).toFixed(0) + '%) — ' + v.description + '</option>';
  });
}).withFailureHandler(function(e) {
  setStatus('⚠️ Could not load accounts: ' + e.message, true);
}).getBillSidebarData();

// --- Submit bill ---
function submitBill() {
  var vendor = document.getElementById('vendor').value.trim();
  var date = document.getElementById('billDate').value;
  var dueDate = document.getElementById('dueDate').value;
  var amount = parseFloat(document.getElementById('amount').value);
  var currency = document.getElementById('currency').value;
  var vendorRef = document.getElementById('vendorRef').value.trim();
  var expenseAccount = document.getElementById('expenseAccount').value;
  var apAccount = document.getElementById('apAccount').value;
  var vatCode = document.getElementById('vatCode').value;
  var description = document.getElementById('description').value.trim();

  if (!vendor) { setStatus('Vendor is required.', true); return; }
  if (!date) { setStatus('Invoice date is required.', true); return; }
  if (!dueDate) { setStatus('Due date is required.', true); return; }
  if (!amount || amount <= 0) { setStatus('Amount must be positive.', true); return; }
  if (!expenseAccount) { setStatus('Expense account is required.', true); return; }
  if (!apAccount) { setStatus('AP account is required.', true); return; }

  setStatus('Posting…');
  var bill = { vendor: vendor, date: date, due_date: dueDate, amount: amount,
    vendor_ref: vendorRef || undefined, expense_account: expenseAccount,
    ap_account: apAccount, vat_code: vatCode || undefined,
    description: description || undefined };
  if (currency) bill.currency = currency;

  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.created) {
        setStatus('✅ Bill posted: ' + r.billId.substring(0, 8) + '… (status: ' + r.status + ')');
        clearForm();
      } else {
        setStatus('❌ ' + ((r && r.errors) ? r.errors.join(', ') : 'Failed'), true);
      }
    })
    .withFailureHandler(function(e) { setStatus('❌ ' + e.message, true); })
    .postBillFromSidebar(bill);
}

// --- Clear form ---
function clearForm() {
  document.getElementById('vendor').value = '';
  document.getElementById('billDate').value = today;
  document.getElementById('dueDate').value = due30;
  document.getElementById('amount').value = '';
  document.getElementById('currency').value = '';
  document.getElementById('vendorRef').value = '';
  document.getElementById('expenseAccount').value = '';
  document.getElementById('apAccount').value = '';
  document.getElementById('vatCode').value = '';
  document.getElementById('description').value = '';
}

// --- Load bills list ---
function loadBills() {
  var status = document.getElementById('filterStatus').value;
  document.getElementById('billsList').innerHTML = '<div class="loading">Loading…</div>';
  google.script.run
    .withSuccessHandler(renderBills)
    .withFailureHandler(function(e) {
      document.getElementById('billsList').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
    })
    .listBillsForSidebar(status);
}

function renderBills(bills) {
  var el = document.getElementById('billsList');
  if (!bills || bills.length === 0) {
    el.innerHTML = '<div class="loading">No bills found.</div>';
    return;
  }
  var html = '';
  bills.forEach(function(b) {
    var statusCls = 'status-' + b.status;
    var rowCls = 'bill-row' + (b.status === 'paid' ? ' paid' : '') + (b.status === 'void' ? ' void' : '');
    var voidBtn = (b.status === 'posted' || b.status === 'partial')
      ? '<button class="btn btn-red" style="font-size:11px;padding:3px 8px" onclick="voidBill(\'' + b.bill_id + '\',\'' + b.vendor + '\')">Void</button>'
      : '';
    var amt = parseFloat(b.amount).toFixed(2);
    var paid = parseFloat(b.amount_paid || 0).toFixed(2);
    var paidNote = b.status === 'partial' ? ' (paid: ' + paid + ')' : '';
    html += '<div class="' + rowCls + '">'
          + '<div class="bill-top"><span class="bill-vendor">' + esc(b.vendor) + '</span>'
          + '<span class="bill-amount">' + (b.currency || '') + ' ' + amt + paidNote + '</span></div>'
          + '<div class="bill-meta">'
          + (b.vendor_ref ? esc(b.vendor_ref) + ' · ' : '')
          + (b.date ? (b.date.value || b.date).substring(0,10) : '') + ' → due ' + (b.due_date ? (b.due_date.value||b.due_date).substring(0,10) : '')
          + '</div>'
          + '<div style="margin-top:4px;display:flex;justify-content:space-between;align-items:center;">'
          + '<span class="bill-status ' + statusCls + '">' + b.status + '</span>'
          + voidBtn
          + '</div>'
          + '</div>';
  });
  el.innerHTML = html;
}

function voidBill(billId, vendor) {
  if (!confirm('Void bill from ' + vendor + '?\nThis will reverse the journal entry.')) return;
  setStatus('Voiding…');
  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.voided) {
        setStatus('✅ Bill voided.');
        loadBills();
      } else {
        setStatus('❌ ' + (r ? JSON.stringify(r) : 'Failed'), true);
      }
    })
    .withFailureHandler(function(e) { setStatus('❌ ' + e.message, true); })
    .voidBillFromSidebar(billId);
}

function setStatus(msg, isErr) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = isErr ? 'err' : (msg.startsWith('✅') ? 'ok' : '');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
