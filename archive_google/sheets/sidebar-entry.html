<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; font-size: 14px; margin: 0; padding: 0; }
    body { background: #fafafa; }

    /* Header */
    .header { background: #2d2d2d; color: #fff; padding: 10px 12px; font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .header span { font-size: 15px; }

    /* Content */
    .content { padding: 12px; }

    /* Forms */
    label { display: block; margin: 8px 0 3px; font-weight: bold; color: #555; font-size: 12px; }
    input, select { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    input:focus, select:focus { border-color: #4285f4; outline: none; }

    /* Journal entry lines */
    .line { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin: 6px 0; }
    .line-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .line-header span { font-weight: bold; color: #888; font-size: 11px; }
    .line-header button { background: #e53935; color: white; border: none; border-radius: 3px; padding: 1px 7px; cursor: pointer; font-size: 11px; }
    .row { display: flex; gap: 6px; }
    .row > div { flex: 1; }

    /* Buttons */
    .btn { display: inline-block; padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
    .btn-primary { background: #4285f4; color: white; }
    .btn-primary:hover { background: #3367d6; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #ccc; }
    .btn-green { background: #34a853; color: white; }
    .btn-green:hover { background: #2d8e47; }
    .btn-full { width: 100%; }

    /* Reversal search */
    .search-box { display: flex; gap: 4px; margin: 6px 0; }
    .search-box input { flex: 1; }
    .search-box button { flex: 0 0 36px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    .search-results { max-height: 150px; overflow-y: auto; margin: 4px 0; }
    .search-result { padding: 6px 8px; margin: 2px 0; background: #fff; border: 1px solid #e8e8e8; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .search-result:hover { background: #fff3cd; border-color: #ffc107; }
    .search-result .sr-date { color: #888; }
    .search-result .sr-amount { font-weight: bold; float: right; }

    /* Status */
    .totals { background: #e8f0fe; padding: 6px 10px; border-radius: 4px; margin: 6px 0; font-weight: bold; text-align: center; font-size: 12px; }
    .totals.balanced { background: #e6f4ea; }
    .totals.unbalanced { background: #fce8e6; }
    #global-status { position: sticky; top: 36px; z-index: 9; margin: 0; border-radius: 0; padding: 6px 8px; font-size: 12px; min-height: 28px; background: #f0f0f0; color: #888; text-align: center; }
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 10px 0; }
    .help { color: #999; font-size: 11px; }
    .section-title { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }

    /* Auto-open toggle */
    .auto-open { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #f5f5f5; border-top: 1px solid #e0e0e0; font-size: 12px; color: #666; position: fixed; bottom: 0; left: 0; right: 0; }
    .auto-open input[type="checkbox"] { width: auto; margin: 0; }
    .auto-open label { margin: 0; font-weight: normal; font-size: 12px; color: #666; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <span>⚖️ Journal Entry</span>
</div>

<div id="global-status">&nbsp;</div>

<div class="content" style="padding-bottom: 44px;">

  <!-- Reverse search -->
  <label>🔍 Find & Reverse</label>
  <div class="search-box">
    <input type="text" id="searchQuery" placeholder="Batch ID, reference, description, or amount" onkeydown="if(event.key==='Enter')searchEntries()">
    <button onclick="searchEntries()">🔍</button>
  </div>
  <div id="searchResults" class="search-results"></div>

  <hr>

  <!-- Journal entry form -->
  <label>Date</label>
  <input type="date" id="entryDate" />

  <div class="row">
    <div><label>Reference</label><input type="text" id="entryRef" placeholder="INV-001"></div>
  </div>

  <label>Description</label>
  <input type="text" id="entryDesc" placeholder="What is this transaction?" />

  <div class="section-title">
    <strong>Lines</strong>
    <span class="help">Min 2, must balance</span>
  </div>

  <div id="linesContainer"></div>

  <button class="btn btn-green btn-full" onclick="addLine()" style="margin:4px 0">+ Add Line</button>

  <div id="totals" class="totals">DR: 0.00 | CR: 0.00</div>

  <div style="display:flex; gap:6px; margin-top:6px;">
    <button class="btn btn-secondary" style="flex:1" onclick="clearForm()">Clear</button>
    <button class="btn btn-primary" style="flex:2" onclick="postEntry()">Post Entry</button>
  </div>
</div>

<!-- Auto-open toggle pinned to bottom -->
<div class="auto-open">
  <input type="checkbox" id="autoOpenCheck" onchange="toggleAutoOpen(this.checked)">
  <label for="autoOpenCheck">Keep sidebar always visible</label>
</div>

<script>
var accounts = [], vatCodes = [], lineCount = 0;

// ---- Init ----
document.getElementById('entryDate').valueAsDate = new Date();

// Load auto-open state
google.script.run.withSuccessHandler(function(isOn) {
  document.getElementById('autoOpenCheck').checked = !!isOn;
}).getAutoOpenState();

// Lazy-load accounts: show loading state, fetch in background
(function() {
  var statusEl = document.getElementById('global-status');
  statusEl.style.background = '#fef7e0';
  statusEl.style.color = '#ea8600';
  statusEl.textContent = 'Loading accounts...';

  google.script.run.withSuccessHandler(function(data) {
    accounts = data.accounts || [];
    vatCodes = data.vatCodes || [];
    // Rebuild lines with loaded data
    var container = document.getElementById('linesContainer');
    container.innerHTML = '';
    lineCount = 0;
    addLine(); addLine();
    statusEl.style.background = '#e6f4ea';
    statusEl.style.color = '#137333';
    statusEl.textContent = '✅ Ready — ' + accounts.length + ' accounts loaded';
    setTimeout(function() { clearStatus(); }, 3000);
  }).withFailureHandler(function(e) {
    statusEl.style.background = '#fce8e6';
    statusEl.style.color = '#c5221f';
    statusEl.textContent = '❌ Failed to load: ' + e.message;
    // Still add empty lines so form is usable
    addLine(); addLine();
  }).getSidebarInitDataWithAccounts();
})();

// ---- Auto-open toggle ----
function toggleAutoOpen(checked) {
  google.script.run.withSuccessHandler(function(msg) {
    showStatus('success', msg);
  }).withFailureHandler(function(e) {
    showStatus('error', '❌ ' + e.message);
  }).setAutoOpen(checked);
}

// ---- Entry: Add/Remove Lines ----
function addLine(acct, dr, cr, vat) {
  lineCount++;
  var n = lineCount;
  var div = document.createElement('div');
  div.className = 'line'; div.id = 'line-' + n;

  var ao = '<option value="">— Account —</option>';
  if (accounts.length === 0) {
    ao += '<option value="" disabled>Loading accounts...</option>';
  } else {
    for (var i = 0; i < accounts.length; i++) {
      ao += '<option value="' + accounts[i].code + '"' + (acct === accounts[i].code ? ' selected' : '') + '>' + accounts[i].code + ' — ' + accounts[i].name + '</option>';
    }
  }

  var vo = '<option value="">No VAT</option>';
  for (var i = 0; i < vatCodes.length; i++) {
    vo += '<option value="' + vatCodes[i].code + '"' + (vat === vatCodes[i].code ? ' selected' : '') + '>' + vatCodes[i].code + ' (' + Math.round(vatCodes[i].rate * 100) + '%)</option>';
  }

  div.innerHTML = '<div class="line-header"><span>#' + n + '</span><button onclick="removeLine(' + n + ')">✕</button></div>'
    + '<select id="account-' + n + '">' + ao + '</select>'
    + '<div class="row" style="margin-top:4px"><div><label>DR</label><input type="number" id="debit-' + n + '" step="0.01" min="0" value="' + (dr || 0) + '" oninput="updateTotals()"></div>'
    + '<div><label>CR</label><input type="number" id="credit-' + n + '" step="0.01" min="0" value="' + (cr || 0) + '" oninput="updateTotals()"></div></div>'
    + '<select id="vat-' + n + '" style="margin-top:4px">' + vo + '</select>';
  document.getElementById('linesContainer').appendChild(div);
  updateTotals();
}

function removeLine(n) {
  var e = document.getElementById('line-' + n);
  if (e) e.remove();
  updateTotals();
}

function updateTotals() {
  var dr = 0, cr = 0;
  document.querySelectorAll('[id^="line-"]').forEach(function(l) {
    var n = l.id.split('-')[1];
    dr += parseFloat(document.getElementById('debit-' + n)?.value || 0);
    cr += parseFloat(document.getElementById('credit-' + n)?.value || 0);
  });
  var d = Math.abs(dr - cr), el = document.getElementById('totals');
  el.textContent = 'DR: ' + dr.toFixed(2) + ' | CR: ' + cr.toFixed(2) + (d > 0.01 ? ' | Diff: ' + d.toFixed(2) : ' ✅');
  el.className = 'totals ' + (d <= 0.01 ? 'balanced' : 'unbalanced');
}

// ---- Entry: Post ----
function postEntry() {
  var lines = [], date = document.getElementById('entryDate').value,
      desc = document.getElementById('entryDesc').value, ref = document.getElementById('entryRef').value;
  document.querySelectorAll('[id^="line-"]').forEach(function(l) {
    var n = l.id.split('-')[1],
        a = document.getElementById('account-' + n)?.value,
        dr = parseFloat(document.getElementById('debit-' + n)?.value || 0),
        cr = parseFloat(document.getElementById('credit-' + n)?.value || 0),
        v = document.getElementById('vat-' + n)?.value || '';
    if (a && (dr > 0 || cr > 0)) lines.push({ date: date, account_code: a, debit: dr, credit: cr, description: desc, reference: ref, vat_code: v || undefined });
  });
  if (lines.length < 2) { showStatus('error', 'Need at least 2 lines.'); return; }
  var dr = 0, cr = 0;
  lines.forEach(function(l) { dr += l.debit; cr += l.credit; });
  if (Math.abs(dr - cr) > 0.01) { showStatus('error', 'Not balanced.'); return; }
  showStatus('warning', 'Posting...');
  google.script.run.withSuccessHandler(function(r) {
    if (r && r.posted) { showStatus('success', '✅ Batch: ' + r.batchId.substring(0, 8) + ' (' + r.lineCount + ' lines)'); clearForm(); }
    else if (r && r.errors) showStatus('error', '❌ ' + r.errors.join('\n'));
  }).withFailureHandler(function(e) { showStatus('error', '❌ ' + e.message); }).postJournalFromSidebar(lines);
}

function clearForm() {
  document.getElementById('entryRef').value = '';
  document.getElementById('entryDesc').value = '';
  document.getElementById('entryDate').valueAsDate = new Date();
  document.getElementById('searchQuery').value = '';
  document.getElementById('linesContainer').innerHTML = '';
  document.getElementById('searchResults').innerHTML = '';
  lineCount = 0;
  addLine(); addLine();
  clearStatus();
}

// ---- Entry: Search & Reverse ----
function searchEntries() {
  var q = document.getElementById('searchQuery').value.trim();
  if (!q) { showStatus('error', 'Enter a search term'); return; }
  showStatus('warning', 'Searching...');
  google.script.run.withSuccessHandler(function(results) {
    var el = document.getElementById('searchResults');
    if (!results || results.length === 0) { el.innerHTML = ''; showStatus('warning', 'No entries found for "' + q + '"'); return; }
    clearStatus();
    el.innerHTML = '';
    var batches = {};
    results.forEach(function(r) {
      if (!batches[r.batch_id]) batches[r.batch_id] = { lines: [], date: r.date, desc: r.description, ref: r.reference };
      batches[r.batch_id].lines.push(r);
    });
    Object.keys(batches).forEach(function(bid) {
      var b = batches[bid], dateStr = (b.date && b.date.value) ? b.date.value : b.date;
      var totalDr = 0, totalCr = 0;
      b.lines.forEach(function(l) { totalDr += Number(l.debit || 0); totalCr += Number(l.credit || 0); });
      var div = document.createElement('div'); div.className = 'search-result';
      div.innerHTML = '<span class="sr-date">' + dateStr + '</span> <span class="sr-amount">' + totalDr.toFixed(0) + '</span><br>'
        + '<small>' + (b.desc || b.ref || bid.substring(0, 8)) + '</small>';
      div.onclick = function() { loadReversal(bid, b); };
      el.appendChild(div);
    });
  }).withFailureHandler(function(e) { showStatus('error', '❌ ' + e.message); }).searchJournalEntries(q);
}

function loadReversal(batchId, batch) {
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('entryDate').valueAsDate = new Date();
  document.getElementById('entryDesc').value = 'Reversal of ' + (batch.ref || batch.desc || batchId.substring(0, 8));
  document.getElementById('entryRef').value = 'REV-' + (batch.ref || batchId.substring(0, 8));
  document.getElementById('linesContainer').innerHTML = ''; lineCount = 0;
  batch.lines.forEach(function(l) { addLine(l.account_code, Number(l.credit || 0), Number(l.debit || 0), null); });
  showStatus('warning', 'Reversal pre-filled. Review and click Post.');
}

// ---- Util ----
function showStatus(type, msg) {
  var e = document.getElementById('global-status');
  var colors = { error: '#fce8e6', success: '#e6f4ea', warning: '#fef7e0' };
  var textColors = { error: '#c5221f', success: '#137333', warning: '#ea8600' };
  e.style.background = colors[type] || '#f0f0f0';
  e.style.color = textColors[type] || '#888';
  e.textContent = msg || '\u00a0';
  if (type === 'success') setTimeout(function() { clearStatus(); }, 4000);
}

function clearStatus() {
  var e = document.getElementById('global-status');
  e.style.background = '#f0f0f0'; e.style.color = '#888'; e.textContent = '\u00a0';
}
</script>
</body>
</html>
